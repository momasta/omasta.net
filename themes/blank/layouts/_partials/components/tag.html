{{- /*
    Stylesheet: assets/sass/components/_tag.scss
*/ -}}

{{ with .context }}
    <a href="{{ .RelPermalink }}"
       class="tag state-interaction-disabled"
       title="{{ .Title }}"
       aria-label="{{- T "tag" }} {{ .LinkTitle }}">
        &#35;{{ .LinkTitle -}}
{{ end }}
    {{- with .lineBreak -}}
        <br>
    {{- end -}}
</a>
