{{- /*
    Stylesheet: assets/sass/components/_breadcrumbs.scss
*/ -}}

<nav class="breadcrumbs" aria-label="breadcrumbs">
    <ol class="links direction-row">
        {{ range .Ancestors.Reverse }}
            {{ if not .IsHome }}
                <li>
                    <a href="{{ .RelPermalink }}" title="{{ T "go-back-to" }} {{ .LinkTitle }}">{{ .LinkTitle }}</a>
                </li><li aria-hidden="true">&nbsp;/&nbsp;</li>
            {{ end }}
        {{ end }}
    </ol>
</nav>

<h1>
    <a href="{{ .RelPermalink }}" rel="bookmark" aria-current="page">{{ .LinkTitle }}</a>
</h1>
