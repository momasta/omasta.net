{{ define "main" -}}

    {{- partial "layout/header.html" . -}}
    
    <div id="middle" class="direction-row">
        <main>
            <div class="card">
                <article>
                    <h1>
                        <a href="{{ .RelPermalink }}" rel="bookmark" aria-current="page">{{ .Title }}</a>
                    </h1>

                    <div class="article-content">
                        {{ .Content -}}
                        
                        {{- if .Pages }}
                            <ul class="links">
                                {{- range .Paginator.Pages -}}
                                    {{- .Render "summary" -}}
                                {{- end -}}
                            </ul>
                        {{ end }}
                    </div>
                </article>
            </div>
        </main>

        {{- partial "layout/sidebar.html" . -}}
    </div>
{{ end }}
